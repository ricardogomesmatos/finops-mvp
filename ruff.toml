target-version = "py312"
line-length = 100
src = ["libs", "pipelines"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line-length já controlado por format; evita duplicar avisos em SQL/strings longas
]

[lint.isort]
known-first-party = ["billing_common"]

[lint.per-file-ignores]
# Cópia literal e exata do template SQL do legado (gcp_labels/templates/silver_query.py).
# Paridade textual byte-a-byte é deliberada nesta entrega — não normalizar
# espaços/linhas dentro das raw strings SQL, mesmo que o ruff aponte
# W291/W292. Ver pipelines/silver/README.md e o plano de migração.
"pipelines/silver/src/silver_pipeline/templates/silver_query.py" = ["W291", "W292"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
exclude = [
    # Cópia literal e exata do template SQL do legado — nunca reformatar
    # (ruff format normalizaria espaços/linhas dentro das raw strings SQL,
    # quebrando a paridade textual byte-a-byte exigida nesta entrega).
    "pipelines/silver/src/silver_pipeline/templates/silver_query.py",
]
